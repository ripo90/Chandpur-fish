name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup project
        run: |
          # Create full Android project structure
          mkdir -p app/src/main/java/com/chandpur/fish
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper

          # HTML file (base64 encoded)
          echo "" | base64 -d > app/src/main/assets/chandpur_fish.html

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "ChandpurFish"
          include ':app'
          EOF

          # Root build.gradle
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

          # App build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.chandpur.fish'
              compileSdk 34
              defaultConfig {
                  applicationId "com.chandpur.fish"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="চাঁদপুর ফিশ"
                  android:theme="@style/Theme.ChandpurFish"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.kt
          cat > app/src/main/java/com/chandpur/fish/MainActivity.kt << 'EOF'
          package com.chandpur.fish
          import android.os.Bundle
          import android.webkit.*
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  webView = findViewById(R.id.webView)
                  webView.settings.apply {
                      javaScriptEnabled = true
                      domStorageEnabled = true
                      allowFileAccess = true
                      databaseEnabled = true
                  }
                  webView.webViewClient = WebViewClient()
                  webView.webChromeClient = WebChromeClient()
                  webView.loadUrl("file:///android_asset/chandpur_fish.html")
              }
              override fun onBackPressed() {
                  if (webView.canGoBack()) webView.goBack() else super.onBackPressed()
              }
          }
          EOF

          # Layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <WebView android:id="@+id/webView"
                  android:layout_width="match_parent" android:layout_height="match_parent"/>
          </LinearLayout>
          EOF

          # Strings & Themes
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">চাঁদপুর ফিশ</string></resources>' > app/src/main/res/values/strings.xml
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.ChandpurFish" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#0a1628</item>
                  <item name="android:statusBarColor">#0a1628</item>
              </style>
          </resources>
          EOF

          # Simple icon (colored square as PNG via Python)
          python3 -c "
          import struct, zlib
          def make_png(size, color):
              def chunk(name, data):
                  c = zlib.crc32(name+data) & 0xffffffff
                  return struct.pack('>I',len(data))+name+data+struct.pack('>I',c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB',size,size,8,2,0,0,0))
              row = b'\x00'+bytes(color)*size
              raw = row*size
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig+ihdr+idat+iend
          colors = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for d,s in colors.items():
              with open(f'app/src/main/res/mipmap-{d}/ic_launcher.png','wb') as f:
                  f.write(make_png(s,[0,212,170]))
              with open(f'app/src/main/res/mipmap-{d}/ic_launcher_round.png','wb') as f:
                  f.write(make_png(s,[0,212,170]))
          print('Icons done')
          "

          # Gradle wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradlew
          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -jar gradle/wrapper/gradle-wrapper.jar "$@"
          EOF
          chmod +x gradlew

          # Download gradle wrapper jar
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar ||           wget -q "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -O gradle/wrapper/gradle-wrapper.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ChandpurFish-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
